name: Build IPA

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
      - 'release_*'
      - 'update*'

permissions:
  contents: write

jobs:
  test-and-build:
    name: Тесты и сборка IPA
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Run unit tests
        run: |
          set -o pipefail
          DEST=$(
            xcodebuild -project AniLibDown/AniLibDown.xcodeproj -scheme AniLibDown \
              -showdestinations 2>/dev/null \
              | rg -o 'platform:iOS Simulator,[^,]+,id:[A-F0-9-]+' \
              | rg 'iPhone' \
              | head -1 \
              | sed 's/^/platform=iOS Simulator,/; s/platform:iOS Simulator,//' \
              | sed 's/,id:/,id=/'
          )
          if [ -z "$DEST" ]; then
            DEST='platform=iOS Simulator,name=iPhone 16'
          fi
          echo "Using destination: $DEST"
          xcodebuild \
            -project AniLibDown/AniLibDown.xcodeproj \
            -scheme AniLibDown \
            -sdk iphonesimulator \
            -destination "$DEST" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            test 2>&1 | tee test.log || {
              echo "=== TEST FAILURES ==="
              rg "error:|failed|TEST FAILED" test.log | head -80 || tail -n 120 test.log
              exit 1
            }

      - name: SwiftLint (optional)
        continue-on-error: true
        run: |
          if command -v swiftlint >/dev/null; then
            swiftlint --config .swiftlint.yml
          else
            echo "SwiftLint not installed, skipping"
          fi

      - name: Build for iPhone (без подписи)
        run: |
          set -o pipefail
          xcodebuild \
            -project AniLibDown/AniLibDown.xcodeproj \
            -scheme AniLibDown \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath DerivedData \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | tee build.log || {
              echo "=== BUILD ERRORS ==="
              rg "error:|warning:.*treated as error|failed" build.log | head -80 || tail -n 120 build.log
              exit 1
            }

      - name: Упаковать .ipa
        run: |
          set -euo pipefail
          APP_PATH=$(find DerivedData -path '*Release-iphoneos/AniLibDown.app' -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "AniLibDown.app не найден"
            find DerivedData -name '*.app' -type d
            exit 1
          fi
          echo "Найдено приложение: $APP_PATH"
          mkdir -p dist/Payload
          cp -R "$APP_PATH" dist/Payload/
          cd dist
          zip -qr AniLibDown.ipa Payload
          rm -rf Payload
          ls -lh AniLibDown.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AniLibDown-ipa
          path: dist/AniLibDown.ipa
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AniLibDown.ipa
          generate_release_notes: true
          body: |
            Неподписанный IPA для установки через Sideloadly.
            Требуется Apple ID (на бесплатном ID срок ~7 дней).

            См. [TESTING_CHECKLIST.md](https://github.com/${{ github.repository }}/blob/main/TESTING_CHECKLIST.md) для проверки.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
