name: Build IPA

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-ipa:
    name: Собрать IPA для Sideloadly
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build for iPhone (без подписи)
        run: |
          set -o pipefail
          xcodebuild \
            -project AniLibDown/AniLibDown.xcodeproj \
            -scheme AniLibDown \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath DerivedData \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | tee build.log || {
              echo "=== BUILD ERRORS ==="
              rg "error:|warning:.*treated as error|failed" build.log | head -80 || tail -n 120 build.log
              exit 1
            }

      - name: Упаковать .ipa
        run: |
          set -euo pipefail
          APP_PATH=$(find DerivedData -path '*Release-iphoneos/AniLibDown.app' -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "AniLibDown.app не найден"
            find DerivedData -name '*.app' -type d
            exit 1
          fi
          echo "Найдено приложение: $APP_PATH"
          mkdir -p dist/Payload
          cp -R "$APP_PATH" dist/Payload/
          cd dist
          zip -qr AniLibDown.ipa Payload
          rm -rf Payload
          ls -lh AniLibDown.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AniLibDown-ipa
          path: dist/AniLibDown.ipa
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AniLibDown.ipa
          generate_release_notes: true
          body: |
            Неподписанный IPA для установки через Sideloadly.
            Требуется Apple ID (на бесплатном ID срок ~7 дней).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
