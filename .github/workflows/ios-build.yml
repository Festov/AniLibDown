name: iOS Build

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-simulator:
    name: Build for iOS Simulator
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcrun simctl list devices available | head -20

      - name: Build app
        run: |
          set -euo pipefail
          xcodebuild \
            -project AniLibDown/AniLibDown.xcodeproj \
            -scheme AniLibDown \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package simulator app
        run: |
          APP_PATH=$(find DerivedData -name 'AniLibDown.app' -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "AniLibDown.app not found"
            find DerivedData -maxdepth 6 -type d
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" dist/AniLibDown-simulator.zip

      - name: Upload simulator build
        uses: actions/upload-artifact@v4
        with:
          name: AniLibDown-simulator
          path: dist/AniLibDown-simulator.zip
          if-no-files-found: error
          retention-days: 14

